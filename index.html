<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard SYSO — Pendientes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #e65c00, #f9a825);
      color: white;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: 0.82rem; opacity: 0.88; margin-top: 4px; }

    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px; }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* ── Contadores ── */
    .counters { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }

    .counter-card {
      flex: 1;
      min-width: 220px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 16px;
      padding: 22px 24px;
      color: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      text-align: center;
    }

    .counter-card .counter-name {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 12px;
    }

    .counter-card .days-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .counter-card .days-num {
      font-size: 4rem;
      font-weight: 800;
      color: #f9a825;
      line-height: 1;
    }

    .counter-card .days-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .counter-card .time-row {
      font-size: 1.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .counter-card .since {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
    }

    /* ── Resto ── */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 20px;
    }

    label { font-size: 0.85rem; font-weight: 600; color: #555; display: block; margin-bottom: 8px; }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: #e65c00; }

    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

    .stat-box {
      flex: 1;
      min-width: 120px;
      background: white;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }
    .stat-box .num { font-size: 2rem; font-weight: 700; color: #e65c00; line-height: 1; }
    .stat-box .lbl { font-size: 0.75rem; color: #888; margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }

    thead th {
      background: #fafafa;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.73rem;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #f0f0f0;
    }

    tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.15s; }
    tbody tr:hover { background: #fff8f0; }
    tbody td { padding: 11px 14px; color: #2d2d2d; vertical-align: top; }

    .badge-id {
      display: inline-block;
      background: #fff3e0;
      color: #e65c00;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-concepto {
      display: inline-block;
      background: #f3f3f3;
      color: #555;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge-area {
      display: inline-block;
      background: #e8f4fd;
      color: #1a6fa8;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .anomalia-text { font-size: 0.85rem; color: #444; line-height: 1.4; }

    .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.9rem; }

    .update-info { font-size: 0.75rem; color: #bbb; text-align: right; margin-top: 12px; }
    .loading { text-align: center; padding: 30px; color: #aaa; font-size: 0.9rem; }

    .error-banner {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #c0392b;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.87rem;
      margin-bottom: 16px;
    }

    @media (max-width: 640px) {
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Dashboard SYSO — Riesgos Pendientes</h1>
  <p>Astillero RASI SRL · Solo registros con estado Pendiente</p>
</header>

<div class="container">

  <div class="section-title">Seguridad</div>
  <div class="counters" id="counters">
    <div class="loading">Cargando contadores...</div>
  </div>

  <div class="card">
    <label for="inspector-select">Seleccioná tu nombre</label>
    <select id="inspector-select"><option value="">Cargando...</option></select>
  </div>

  <div class="stats" id="stats" style="display:none;">
    <div class="stat-box">
      <div class="num" id="count-total">—</div>
      <div class="lbl">Pendientes</div>
    </div>
  </div>

  <div class="card">
    <div class="loading" id="loading-msg">Cargando datos...</div>
    <div class="error-banner" id="error-msg" style="display:none;"></div>
    <table id="data-table" style="display:none;">
      <thead>
        <tr>
          <th>ID Registro</th>
          <th>Tipo / Concepto</th>
          <th>Área</th>
          <th>Anomalía</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="icon">✅</div>
      <p>Sin pendientes para este inspector.</p>
    </div>
  </div>

  <div class="update-info" id="update-info"></div>
</div>

<script>
  const SHEET_ID = '1vigwKRkYpBCRwclcjGMNRg4IcwiCMhFraDi36HTADjw';
  // Riesgo cols (0-indexed): B=1 Inspector, C=2 Tipo_Concepto, F=5 Estado, H=7 ID_Registro, I=8 Area, J=9 Anomalia
  const COL = { inspector:1, tipo_concepto:2, estado:5, id_registro:7, area:8, anomalia:9 };

  let allRows = [];
  // startTimes[i] = Date object for counter i
  let startTimes = [];

  const sel        = document.getElementById('inspector-select');
  const tableBody  = document.getElementById('table-body');
  const dataTable  = document.getElementById('data-table');
  const emptyState = document.getElementById('empty-state');
  const loadingMsg = document.getElementById('loading-msg');
  const errorMsg   = document.getElementById('error-msg');
  const statsDiv   = document.getElementById('stats');
  const countEl    = document.getElementById('count-total');
  const updateInfo = document.getElementById('update-info');
  const countersEl = document.getElementById('counters');

  async function fetchSheet(name) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/)[1]);
    return (json.table.rows || []).map(r => r.c.map(c => (c && c.v != null ? String(c.v) : '')));
  }

  function parseDate(str) {
    str = str.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str + 'T00:00:00');
    const [d, m, y] = str.split('/');
    return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}T00:00:00`);
  }

  function formatDate(d) {
    return d.toLocaleDateString('es-PY', { day:'2-digit', month:'long', year:'numeric' });
  }

  function elapsed(start) {
    const diff = Math.max(0, Math.floor((Date.now() - start.getTime()) / 1000));
    const days = Math.floor(diff / 86400);
    const h    = Math.floor((diff % 86400) / 3600).toString().padStart(2,'0');
    const m    = Math.floor((diff % 3600)  / 60  ).toString().padStart(2,'0');
    const s    = (diff % 60).toString().padStart(2,'0');
    return { days, time: `${h}:${m}:${s}` };
  }

  function tickCounters() {
    startTimes.forEach((start, i) => {
      const { days, time } = elapsed(start);
      const el = document.getElementById(`counter-days-${i}`);
      const tel = document.getElementById(`counter-time-${i}`);
      if (el)  el.textContent  = days;
      if (tel) tel.textContent = time;
    });
  }

  function renderCounters(rows) {
    const data = rows.slice(1).filter(r => r[0] && r[1]);
    if (!data.length) { countersEl.innerHTML = ''; return; }

    startTimes = data.map(r => parseDate(r[1]));

    countersEl.innerHTML = data.map((r, i) => {
      const { days, time } = elapsed(startTimes[i]);
      return `
        <div class="counter-card">
          <div class="counter-name">${r[0]}</div>
          <div class="days-row">
            <span class="days-num" id="counter-days-${i}">${days}</span>
            <span class="days-label">días</span>
          </div>
          <div class="time-row" id="counter-time-${i}">${time}</div>
          <div class="since">desde el ${formatDate(startTimes[i])}</div>
        </div>`;
    }).join('');

    setInterval(tickCounters, 1000);
  }

  function populate(rows) {
    const pending = rows.filter(r => (r[COL.estado]||'').trim().toLowerCase() === 'pendiente');
    const inspectors = [...new Set(pending.map(r => (r[COL.inspector]||'').trim()))].filter(Boolean).sort();
    sel.innerHTML = `<option value="">— Todos los pendientes (${pending.length}) —</option>`;
    inspectors.forEach(name => {
      const o = document.createElement('option');
      o.value = o.textContent = name;
      sel.appendChild(o);
    });
    return pending;
  }

  function render(inspector) {
    const filtered = inspector
      ? allRows.filter(r => (r[COL.inspector]||'').trim() === inspector)
      : allRows;

    countEl.textContent = filtered.length;
    statsDiv.style.display = filtered.length > 0 || inspector ? 'flex' : 'none';
    tableBody.innerHTML = '';

    if (!filtered.length) {
      dataTable.style.display  = 'none';
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
      dataTable.style.display  = 'table';
      filtered.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="badge-id">${r[COL.id_registro]||'—'}</span></td>
          <td><span class="badge-concepto">${r[COL.tipo_concepto]||'—'}</span></td>
          <td><span class="badge-area">${r[COL.area]||'—'}</span></td>
          <td><span class="anomalia-text">${r[COL.anomalia]||'—'}</span></td>
        `;
        tableBody.appendChild(tr);
      });
    }
  }

  sel.addEventListener('change', () => render(sel.value));

  (async () => {
    try {
      const [configRows, riesgoRows] = await Promise.all([
        fetchSheet('Configuracion'),
        fetchSheet('Riesgo')
      ]);
      renderCounters(configRows);
      loadingMsg.style.display = 'none';
      allRows = populate(riesgoRows);
      render('');
      updateInfo.textContent = `Última actualización: ${new Date().toLocaleString('es-PY')}`;
    } catch(e) {
      loadingMsg.style.display = 'none';
      errorMsg.style.display   = 'block';
      errorMsg.textContent     = `No se pudieron cargar los datos. Verificá que el Sheet sea público.\nError: ${e.message}`;
    }
  })();
</script>

</body>
</html>
