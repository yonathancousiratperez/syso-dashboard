<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard SYSO — Pendientes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #e65c00, #f9a825);
      color: white;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.3px; }
    header p  { font-size: 0.82rem; opacity: 0.88; margin-top: 4px; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 20px;
    }

    label { font-size: 0.85rem; font-weight: 600; color: #555; display: block; margin-bottom: 8px; }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { outline: none; border-color: #e65c00; }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat-box {
      flex: 1;
      min-width: 120px;
      background: white;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }

    .stat-box .num { font-size: 2rem; font-weight: 700; color: #e65c00; line-height: 1; }
    .stat-box .lbl { font-size: 0.75rem; color: #888; margin-top: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      background: #fafafa;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #f0f0f0;
    }

    tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.15s; }
    tbody tr:hover { background: #fff8f0; }

    tbody td { padding: 11px 14px; color: #2d2d2d; vertical-align: top; }

    .badge-id {
      display: inline-block;
      background: #fff3e0;
      color: #e65c00;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-concepto {
      display: inline-block;
      background: #f3f3f3;
      color: #555;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .anomalia-text {
      font-size: 0.85rem;
      color: #444;
      line-height: 1.4;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p   { font-size: 0.9rem; }

    .update-info {
      font-size: 0.75rem;
      color: #bbb;
      text-align: right;
      margin-top: 12px;
    }

    .loading { text-align: center; padding: 30px; color: #aaa; font-size: 0.9rem; }

    .error-banner {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #c0392b;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.87rem;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      thead th:nth-child(2) { display: none; }
      tbody td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Dashboard SYSO — Riesgos Pendientes</h1>
  <p>Astillero RASI SRL · Solo registros con estado Pendiente</p>
</header>

<div class="container">

  <div class="card">
    <label for="inspector-select">Seleccioná tu nombre</label>
    <select id="inspector-select">
      <option value="">Cargando...</option>
    </select>
  </div>

  <div class="stats" id="stats" style="display:none;">
    <div class="stat-box">
      <div class="num" id="count-total">—</div>
      <div class="lbl">Pendientes</div>
    </div>
  </div>

  <div class="card" id="table-card">
    <div class="loading" id="loading-msg">Cargando datos...</div>
    <div class="error-banner" id="error-msg" style="display:none;"></div>
    <table id="data-table" style="display:none;">
      <thead>
        <tr>
          <th>ID Registro</th>
          <th>Tipo / Concepto</th>
          <th>Anomalía</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="icon">✅</div>
      <p>Sin pendientes para este inspector.</p>
    </div>
  </div>

  <div class="update-info" id="update-info"></div>

</div>

<script>
  const SHEET_ID   = '1vigwKRkYpBCRwclcjGMNRg4IcwiCMhFraDi36HTADjw';
  const SHEET_NAME = 'Riesgo';
  // B=1 Inspector, C=2 Tipo_Concepto, F=5 Estado, H=7 ID_Registro, J=9 Anomalia
  const COL = { inspector: 1, tipo_concepto: 2, estado: 5, id_registro: 7, anomalia: 9 };

  let allRows = [];

  const sel        = document.getElementById('inspector-select');
  const tableBody  = document.getElementById('table-body');
  const dataTable  = document.getElementById('data-table');
  const emptyState = document.getElementById('empty-state');
  const loadingMsg = document.getElementById('loading-msg');
  const errorMsg   = document.getElementById('error-msg');
  const statsDiv   = document.getElementById('stats');
  const countEl    = document.getElementById('count-total');
  const updateInfo = document.getElementById('update-info');

  async function fetchData() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/)[1]);
    const rows = json.table.rows;
    return rows.map(r => r.c.map(cell => (cell && cell.v != null ? String(cell.v) : '')));
  }

  function populate(rows) {
    const pending = rows.filter(r => (r[COL.estado] || '').trim().toLowerCase() === 'pendiente');
    const inspectors = [...new Set(pending.map(r => (r[COL.inspector] || '').trim()))].filter(Boolean).sort();
    sel.innerHTML = `<option value="">— Todos los pendientes (${pending.length}) —</option>`;
    inspectors.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    return pending;
  }

  function render(inspector) {
    const filtered = inspector
      ? allRows.filter(r => (r[COL.inspector] || '').trim() === inspector)
      : allRows;

    countEl.textContent = filtered.length;
    statsDiv.style.display = filtered.length > 0 || inspector ? 'flex' : 'none';
    tableBody.innerHTML = '';

    if (filtered.length === 0) {
      dataTable.style.display  = 'none';
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
      dataTable.style.display  = 'table';
      filtered.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="badge-id">${r[COL.id_registro] || '—'}</span></td>
          <td><span class="badge-concepto">${r[COL.tipo_concepto] || '—'}</span></td>
          <td><span class="anomalia-text">${r[COL.anomalia] || '—'}</span></td>
        `;
        tableBody.appendChild(tr);
      });
    }
  }

  sel.addEventListener('change', () => render(sel.value));

  (async () => {
    try {
      const rows = await fetchData();
      loadingMsg.style.display = 'none';
      allRows = populate(rows);
      render('');
      updateInfo.textContent = `Última actualización: ${new Date().toLocaleString('es-PY')}`;
    } catch (e) {
      loadingMsg.style.display = 'none';
      errorMsg.style.display   = 'block';
      errorMsg.textContent     = `No se pudieron cargar los datos. Verificá que el Sheet sea público (compartido con "Cualquier persona con el enlace").\nError: ${e.message}`;
    }
  })();
</script>

</body>
</html>
